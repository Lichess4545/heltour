name: Docker Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-devenv

      - name: Build and verify images
        if: github.event_name == 'pull_request'
        run: devenv shell -- dagger call --mod=.dagger build --source=. --github-short-sha="${{ github.sha }}"

      # Publishes on every push event (any branch), not just master -- matches the
      # existing temporary all-branches publish state from the pre-Dagger workflow.
      - name: Build, verify, and publish images
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        run: >
          devenv shell -- dagger call --mod=.dagger publish
          --source=.
          --ref="${{ github.ref }}"
          --event-name="${{ github.event_name }}"
          --pr-number="${{ github.event.pull_request.number || '' }}"
          --registry-username="${{ github.actor }}"
          --registry-password=env://GITHUB_TOKEN
          --github-sha="${{ github.sha }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
