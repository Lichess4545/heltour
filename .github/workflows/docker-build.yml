name: Docker Build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: lichess4545

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate tag
        id: tag
        run: |
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "TAG=latest" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "TAG=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          else
            # Use branch name as tag, sanitized for Docker
            TAG=$(echo "${{ github.ref }}" | sed -e 's/refs\/heads\///' -e 's/[^a-zA-Z0-9._-]/-/g')
            echo "TAG=${TAG}" >> $GITHUB_OUTPUT
          fi
          echo "GITHUB_SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build every image on every event so PR CI catches regressions
      # in any image (e.g. `litour-ui`) before they reach master. Only
      # push when we'd actually publish — master pushes, PRs verify.
      #
      # Cache config lives in `docker/docker-bake.hcl` so each target
      # gets its own GHA scope (preventing the 10 GB cache cap from
      # evicting one image's layers when a sibling builds). Master also
      # writes a registry-stored cache image (`...:buildcache`) that
      # PR runs read from, so a cold GHA cache still warm-starts from
      # the last published cache.
      - name: Build (and push on master)
        uses: docker/bake-action@v5
        with:
          files: docker/docker-bake.hcl
          targets: default
          push: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master') }}
        env:
          TAG: ${{ steps.tag.outputs.TAG }}
          REGISTRY: ghcr.io/${{ env.IMAGE_PREFIX }}
          GITHUB_SHORT_SHA: ${{ steps.tag.outputs.GITHUB_SHORT_SHA }}
          # `pull` always reads cache; `push` is set on master/dispatch
          # so only canonical builds publish into the shared registry
          # cache image.
          REGISTRY_CACHE: ${{ (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/master')) && 'push' || 'pull' }}
