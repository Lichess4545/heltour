name: Set up Dagger
description: Install the Dagger CLI and Bun so a workflow job can run `dagger call` against .dagger/.

inputs:
  dagger-version:
    description: Dagger CLI version to install, matching dagger.json's engineVersion.
    required: true
    default: "0.21.7"
  bun-version:
    description: Bun version to install (host-side only; the Dagger module itself runs Bun inside its own container regardless of this).
    required: true
    default: "latest"

runs:
  using: composite
  steps:
    - name: Install Dagger CLI
      shell: bash
      run: |
        curl -fsSL https://dl.dagger.io/dagger/install.sh | DAGGER_VERSION="${{ inputs.dagger-version }}" BIN_DIR="$HOME/.local/bin" sh
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Install Bun
      shell: bash
      run: |
        if [ "${{ inputs.bun-version }}" = "latest" ]; then
          curl -fsSL https://bun.sh/install | BUN_INSTALL="$HOME/.bun" bash
        else
          curl -fsSL https://bun.sh/install | BUN_INSTALL="$HOME/.bun" bash -s "bun-v${{ inputs.bun-version }}"
        fi
        echo "$HOME/.bun/bin" >> "$GITHUB_PATH"
